<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Add</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="./stylesheets/style.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div class="home-button">
        <button class="btn btn-secondary" onclick="window.location.href='Library.html'">Home</button>
      </div>
    </div>
  </div>

  <h1 class="pages-text-center">Add a Book</h1>

  <form class="form container" style="max-width: 700px;">
    <div class="form-group">
      <label for="book_type"><b>Book Type:</b></label>
      <input name="book_type" id="book_type" type="text" class="form-control" placeholder="e.g., Fiction, Self Help" required>
    </div>

    <div class="form-group">
      <label for="book_name"><b>Book Name:</b></label>
      <input name="book_name" id="book_name" type="text" class="form-control" placeholder="Enter Book Name" required>
    </div>

    <div class="form-group">
      <label for="author"><b>Author:</b></label>
      <input name="author" id="author" type="text" class="form-control" placeholder="Enter Author (optional)">
    </div>

    <div class="form-group">
      <label for="rating"><b>Rating (1–5):</b></label>
      <input name="rating" id="rating" type="number" min="1" max="5" class="form-control" placeholder="optional">
    </div>

    <div class="form-group">
      <button type="submit" class="btn btn-primary btn-lg btn-block">Add Book</button>
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="./js/jquery.toaster.js"></script>

  <!-- Add API -->
  <script src="./js/postlibrary.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Update</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="./stylesheets/style.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div class="home-button">
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Home</button>
      </div>
    </div>
  </div>

  <h1 class="pages-text-center">Update a Book</h1>

  <form class="form container" style="max-width: 700px;">
    <div class="form-group">
      <label for="id"><b>Select Book:</b></label>
      <select name="id" id="id" class="form-control"></select>
    </div>

    <div class="form-group">
      <label for="book_type"><b>Book Type:</b></label>
      <input name="book_type" id="book_type" type="text" class="form-control" placeholder="Enter Book Type">
    </div>

    <div class="form-group">
      <label for="book_name"><b>Book Name:</b></label>
      <input name="book_name" id="book_name" type="text" class="form-control" placeholder="Enter Book Name">
    </div>

    <div class="form-group">
      <label for="author"><b>Author:</b></label>
      <input name="author" id="author" type="text" class="form-control" placeholder="Enter Author (optional)">
    </div>

    <div class="form-group">
      <label for="rating"><b>Rating (1–5):</b></label>
      <input name="rating" id="rating" type="number" min="1" max="5" class="form-control" placeholder="optional">
    </div>

    <div class="form-group">
      <button type="submit" class="btn btn-primary btn-lg btn-block">Update</button>
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="./js/jquery.toaster.js"></script>

  <script>
    // Populate dropdown with real books from DB
    (async function loadBooks() {
      const select = document.getElementById("id");
      const res = await fetch("https://michael-sbackend.onrender.com/api/v1/library");
      const books = await res.json();

      select.innerHTML = "";
      books.forEach((b) => {
        const opt = document.createElement("option");
        opt.value = b.id;
        opt.text = `${b.id} — ${b.book_name}`;
        select.appendChild(opt);
      });
    })();
  </script>

  <!-- Update API -->
  <script src="./js/updateLibrary.js"></script>
</body>
</html>
